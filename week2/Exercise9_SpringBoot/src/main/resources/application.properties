# =====================================================================
# Exercise 9: Spring Boot Library Management Application
# application.properties - Application Configuration
# =====================================================================

# ----- Server Configuration -----
server.port=8080

# ----- H2 In-Memory Database Configuration -----
# JDBC URL for H2 in-memory database named 'librarydb'
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ----- H2 Console (web-based DB browser) -----
# Access at: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----- JPA / Hibernate Configuration -----
# create-drop: creates schema on startup, drops on shutdown
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ----- Logging -----
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
