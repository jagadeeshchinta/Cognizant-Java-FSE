# Spring Boot Application Properties
# Exercise 4: JWT Authentication with Spring Security

server.port=8090

# Logging
logging.level.root=INFO
logging.level.com.cognizant=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===== JWT Configuration =====
# Secret key for signing JWT tokens (use a strong key in production)
jwt.secret=cognizant-spring-learn-jwt-secret-key-2024-must-be-at-least-256-bits
# Token validity in milliseconds: 1200000 = 20 minutes
jwt.expiration=1200000
